kind = "web"
previewPath = "/"
title = "GradPath AI"
version = "1.0.0"
id = "artifacts/gradpath"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20973

[services.development]
run = "pnpm --filter @workspace/gradpath run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gradpath", "run", "build" ]
publicDir = "artifacts/gradpath/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20973"
BASE_PATH = "/"
